<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyWebsite App</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#0f172a;
color:white;
overflow-x:hidden;
padding-bottom:70px;
}

/* MARQUEE */
.marquee{
background:#1e293b;
padding:8px;
overflow:hidden;
white-space:nowrap;
font-size:13px;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:jalan 25s linear infinite;
}

@keyframes jalan{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* CONTENT */
.content{padding:15px;}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.logo img{
width:40px;
height:40px;
border-radius:50%;
box-shadow:0 0 10px cyan;
animation:putar 6s linear infinite;
}

@keyframes putar{
from{transform:rotate(0);}
to{transform:rotate(360deg);}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
animation:fadeSlide .4s ease;
}

/* CARD */
.card-neon{
background:#0d0e0d;
padding:15px;
border-radius:12px;
cursor:pointer;
text-align:center;
color:#38bdf8;
border:1px solid rgba(0,255,255,0.3);
transition:.3s;
}

.card-neon:hover{
transform:translateY(-5px);
box-shadow:0 0 10px cyan,0 0 20px cyan;
}

/* SLIDER */
.slider{
margin-top:15px;
border-radius:12px;
overflow:hidden;
}

.slider img{
width:100%;
display:none;
}

.slider img.active{
display:block;
}

/* ANIMASI */
@keyframes fadeSlide{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* BOTTOM NAV */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#020617;
display:flex;
justify-content:space-around;
align-items:center;
z-index:999;
border-top:1px solid rgba(0,255,255,0.3);
}

.nav-item{
flex:1;
text-align:center;
color:#94a3b8;
font-size:12px;
cursor:pointer;
position:relative;
}

.nav-item i{
font-size:18px;
display:block;
margin-bottom:2px;
transition:.3s;
}

.nav-item.active{
color:#22d3ee;
}

.nav-item.active i{
transform:translateY(-5px) scale(1.2);
text-shadow:0 0 10px cyan;
}

/* RIPPLE */
.nav-item::after{
content:"";
position:absolute;
width:10px;
height:10px;
background:rgba(0,255,255,0.5);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
}

.nav-item:active::after{
animation:ripple .5s linear;
}

@keyframes ripple{
0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
100%{transform:translate(-50%,-50%) scale(6);opacity:0;}
}

/* CONTAINER */
.title-job-pro{
display:flex;
align-items:center;
gap:12px;
font-size:20px;
position:relative;
padding:10px 15px;
border-radius:12px;
overflow:hidden;
background:rgba(0,20,40,0.5);
backdrop-filter:blur(8px);
}

/* ICON BOX */
.icon-box{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:linear-gradient(135deg,#06e1f1,#3b82f6);
box-shadow:0 0 10px cyan,0 0 20px cyan;
animation:pulse 2s infinite;
}

.icon-box i{
color:white;
font-size:18px;
}

/* TEXT */
.title-job-pro .text{
color:#22d3ee;
font-weight:bold;
letter-spacing:1px;
text-shadow:0 0 10px cyan;
}

/* NEON GARIS BERJALAN */
.title-job-pro::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:2px;
background:linear-gradient(90deg,transparent,cyan,transparent);
animation:lineMove 3s linear infinite;
}

@keyframes lineMove{
0%{left:-100%;}
100%{left:100%;}
}

/* ICON PULSE */
@keyframes pulse{
0%{box-shadow:0 0 5px cyan;}
50%{box-shadow:0 0 20px cyan,0 0 40px cyan;}
100%{box-shadow:0 0 5px cyan;}
}
</style>
</head>

<body>

<!-- MARQUEE -->
<div class="marquee">
<span>
𝐂𝐚𝐭𝐚𝐭𝐚𝐧 𝐚𝐤𝐭𝐢𝐯𝐢𝐭𝐚𝐬 𝐝𝐢𝐩𝐞𝐫𝐛𝐚𝐫𝐮𝐢 • 
<a href="#">𝘓𝘪𝘩𝘢𝘵 𝘏𝘢𝘴𝘪𝘭</a> • 
𝐃𝐚𝐭𝐚 𝐚𝐦𝐚𝐧 & 𝐭𝐞𝐫𝐞𝐧𝐤𝐫𝐢𝐩𝐬𝐢
</span>
</div>

<div class="content" id="content"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

<div class="nav-item active" onclick="setActive(this); showPage('home')">
<i class="fas fa-home"></i>
<span>Home</span>
</div>

<div class="nav-item" onclick="setActive(this); showPage('aktivitas')">
<i class="fas fa-bolt"></i>
<span>Aktivitas</span>
</div>

<div class="nav-item" onclick="setActive(this); showPage('history')">
<i class="fas fa-briefcase"></i>
<span>MyJob</span>
</div>

<div class="nav-item" onclick="setActive(this); showPage('walet')">
<i class="fas fa-wallet"></i>
<span>Wallet</span>
</div>

<div class="nav-item" onclick="setActive(this); showPage('web')">
<i class="fas fa-globe"></i>
<span>Web</span>
</div>

</div>

<script>
let sliderInterval;

function startSlider(){
clearInterval(sliderInterval);

let index=0;
let images=document.querySelectorAll(".slider img");

if(images.length===0)return;

images.forEach(img=>img.classList.remove("active"));
images[0].classList.add("active");

sliderInterval=setInterval(()=>{
images[index].classList.remove("active");
index=(index+1)%images.length;
images[index].classList.add("active");
},3000);
}

function showPage(page){
let content=document.getElementById("content");

if(page==="home"){
content.innerHTML=`
<h2 class="title-job-pro"><span class="icon-box"><i class="fas fa-house-user"></i></span><span class="text">Home</span></h2>

<div class="slider">
<img src="https://i.postimg.cc/SxgSTgf0/Screenshot-63.jpg" class="active">
<img src="https://i.postimg.cc/DZhHsX8g/download.jpg">
<img src="https://i.postimg.cc/dVt3t12Z/sddefault.jpg">
<img src="https://i.postimg.cc/d3NZLtCR/halaman-20240620125629.png" class="active">
<img src="https://i.postimg.cc/dV4BLLgf/Screenshot-65.jpg">
<img src="https://i.postimg.cc/BnYTJR1V/How-to-answer-Tell-me-about-a-time-when-you-made-a-mistake-in-an-interview-with-confidence-and-cla.jpg">
<img src="https://i.postimg.cc/pTxX4LL5/1af819a68e75bc0b977dc1cafc8e516b.jpg" class="active">
<img src="https://i.postimg.cc/7LNyCMqf/maxresdefault.jpg">
<img src="https://i.postimg.cc/y84qvrd6/njuq-Y8b-VEAK48u-SGWi-Xx-Pi.jpg">
<img src="https://i.postimg.cc/fLJZ6SQr/Website-design.webp" class="active">
</div>
`;
}

if(page==="aktivitas"){
content.innerHTML=`
<h2 class="title-job-pro"><span class="icon-box"><i class="fas fa-person-running"></i></span><span class="text">Aktivitas</span></h2>

<div class="grid">
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/drlaser/')">DrLaser</div>
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/HITMATDUTHERI/')">Alkitab</div>
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/note/')">Pengeluaran</div>
</div>

<div class="slider">
<img src="https://i.postimg.cc/DZhHsX8g/download.jpg">
<img src="https://i.postimg.cc/dVt3t12Z/sddefault.jpg">
<img src="https://i.postimg.cc/d3NZLtCR/halaman-20240620125629.png" class="active">
</div>
`;
}

if(page==="history"){
content.innerHTML=`
<h2 class="title-job-pro"><span class="icon-box"><i class="fas fa-briefcase"></i></span><span class="text">MyJob</span></h2>

<div class="grid">
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/graceresto/')">Penjualan</div>
<div class="card-neon" onclick="window.open('https://omkstpetrusdanpaulusrasulsekonau-byte.github.io/mistake/')">Mistake</div>
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/Tracker-Konsumsi-Rokok-/')">Sin</div>
</div>

<div class="slider">
<img src="https://i.postimg.cc/dV4BLLgf/Screenshot-65.jpg">
<img src="https://i.postimg.cc/BnYTJR1V/How-to-answer-Tell-me-about-a-time-when-you-made-a-mistake-in-an-interview-with-confidence-and-cla.jpg">
<img src="https://i.postimg.cc/pTxX4LL5/1af819a68e75bc0b977dc1cafc8e516b.jpg" class="active">
</div>
`;
}

if(page==="walet"){
content.innerHTML=`
<h2 class="title-job-pro"><span class="icon-box"><i class="fas fa-credit-card"></i></span><span class="text">E-Walet</span></h2>

<div class="grid">
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/pasimpong/')">Tabungan</div>
</div>

<div class="slider">
<img src="https://i.postimg.cc/7LNyCMqf/maxresdefault.jpg">
</div>
`;
}

if(page==="web"){
content.innerHTML=`
<h2 class="title-job-pro"><span class="icon-box"><i class="fas fa-globe"></i></span><span class="text">Web-Site</span></h2>

<div class="grid">
<div class="card-neon" onclick="window.open('https://sites.google.com/view/mudasarohani/page_2')">HDS</div>
<div class="card-neon" onclick="window.open('https://omkstpetrusdanpaulusrasulsekonau-byte.github.io/landingpageomksekonau/')">OMK</div>
</div>

<div class="slider">
<img src="https://i.postimg.cc/y84qvrd6/njuq-Y8b-VEAK48u-SGWi-Xx-Pi.jpg">
<img src="https://i.postimg.cc/fLJZ6SQr/Website-design.webp" class="active">
</div>
`;
}

startSlider();
}

function setActive(el){
document.querySelectorAll(".nav-item").forEach(item=>{
item.classList.remove("active");
});
el.classList.add("active");
}

showPage("home");
</script>

</body>
</html>
