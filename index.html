<!DOCTYPE html>
<html lang="id">
<head><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data dan Catatan Aktivitas</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#020617;
flex-wrap:wrap;
position:relative;
overflow:hidden;
}

/* NEON BORDER */
.navbar::before{
content:"";
position:absolute;
inset:-2px;
background:linear-gradient(90deg,rgb(232, 5, 141),#03eef2);
background-size:300%;
animation:neonBorder 8s linear infinite;
filter:blur(6px);
z-index:0;
}

.navbar>*{
position:relative;
z-index:1;
}

/* MENU */
.menu-wrapper{
border:2px solid cyan;
padding:5px;
border-radius:8px;
}

.menu{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.menu a{
padding:8px 12px;
border:1px solid cyan;
border-radius:6px;
color:white;
text-decoration:none;
font-size:14px;
}

.menu a:hover{
background:#38bdf8;
color:black;
}

/* MARQUEE */
.marquee{
background:#1e293b;
padding:8px;
overflow:hidden;
white-space:nowrap;
font-size:13px;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:jalan 25s linear infinite;
}

@keyframes jalan{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* LAYOUT */
.container{
display:flex;
flex-wrap:wrap;
}

/* SIDEBAR */
.sidebar-wrapper{
width:260px;
padding:10px;
}

.sidebar{
display:flex;
flex-direction:column;
gap:10px;
background:#0b1a2a;
padding:10px;
border-radius:12px;
position:relative;
overflow:hidden;
}

.sidebar::before{
content:"";
position:absolute;
inset:-3px;
background:linear-gradient(90deg,cyan,blue,rgb(6, 217, 245),cyan);
background-size:300%;
animation:neonKeliling 6s linear infinite;
filter:blur(8px);
z-index:0;
}

.sidebar::after{
content:"";
position:absolute;
inset:0;
background:#0b1a2a;
border-radius:12px;
z-index:0;
}

.sidebar *{
position:relative;
z-index:1;
}

/* CONTENT */
.content{
flex:1;
padding:15px;
min-width:0;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* CARD NEON */
.card-neon{
background:#0d0e0d;
padding:15px;
border-radius:12px;
cursor:pointer;
text-align:center;
color:#38bdf8;
border:1px solid rgba(0,255,255,0.3);
transition:.3s;
}

.card-neon:hover{
transform:translateY(-5px);
box-shadow:0 0 10px cyan,0 0 20px cyan;
}

/* SLIDER */
.slider{
margin-top:15px;
border-radius:12px;
overflow:hidden;
}

.slider img{
width:100%;
display:none;
border-radius:12px;
}

.slider img.active{
display:block;
}

/* TITLE */
.title-box{
display:block;
width:100%;
max-width:100%;
text-align:center;
padding:10px;
margin-bottom:15px;
border-radius:10px;
background:rgba(0,20,40,.7);
box-shadow:0 0 15px rgba(255,255,255,.2);
}

.title-box h2{
color:#06e1f1;
font-size:18px;
}

/* ANIMATION */
@keyframes neonBorder{
0%{background-position:0%;}
100%{background-position:300%;}
}

@keyframes neonKeliling{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* 🔥 MOBILE MODE */
@media(max-width:768px){

.navbar{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.container{
flex-direction:column;
}

.sidebar-wrapper{
width:100%;
}

.menu{
justify-content:center;
}

.title-box h2{
font-size:16px;
}

}
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* LOGO GAMBAR */
.logo img {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 50%;

    /* 🔥 efek neon */
    box-shadow:
        0 0 10px cyan,
        0 0 20px cyan,
        0 0 40px cyan;
}

/* TEKS */
.logo span {
    font-size: 18px;
    font-weight: bold;
    color: white;
}
.logo img {
    animation: putar 6s linear infinite;
}

@keyframes putar {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
/* TOGGLE MENU */
.menu-toggle{
display:none;
font-size:22px;
cursor:pointer;
color:white;
}

/* MOBILE MENU */
@media(max-width:768px){

.menu-toggle{
display:block;
}

.menu-wrapper{
width:100%;
display:none;
}

.menu-wrapper.active{
display:block;
animation:fadeIn .3s ease;
}

.menu{
flex-direction:column;
width:100%;
}

.menu a{
width:100%;
text-align:center;
}

}
/* SIDEBAR MOBILE */
.sidebar-toggle{
display:none;
font-size:22px;
cursor:pointer;
color:white;
}

@media(max-width:768px){

.sidebar-toggle{
display:block;
}

.sidebar-wrapper{
position:fixed;
top:0;
left:-260px;
height:100%;
z-index:999;
background:#0b1a2a;
transition:.3s;
width:260px;
}

.sidebar-wrapper.active{
left:0;
}

/* overlay gelap */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:998;
}

.overlay.active{
display:block;
}

}
</style>
</head>

<body>

</div>
<div class="overlay" onclick="toggleSidebar()"></div>
<div class="logo"><img src="https://i.postimg.cc/1tzGvTyf/web-logo-web-letter-web-letter-logo-design-initials-web-logo-linked-with-circle-and-uppercase-monogr.jpg" alt="logo"><span>𝐌𝐲𝐖𝐞𝐛𝐬𝐢𝐭𝐞</span></div>

</div>
</div>

<!-- MARQUEE -->
<div class="marquee">
<span>
𝐂𝐚𝐭𝐚𝐭𝐚𝐧 𝐚𝐤𝐭𝐢𝐯𝐢𝐭𝐚𝐬 𝐝𝐢𝐩𝐞𝐫𝐛𝐚𝐫𝐮𝐢 • 
<a href="#">𝘓𝘪𝘩𝘢𝘵 𝘏𝘢𝘴𝘪𝘭</a> •

</span>
</div>

<div class="container">

<div class="sidebar-wrapper">
<div class="sidebar">

<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/drlaser/')">DrLaser</div>

<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/HITMATDUTHERI/')">Alkitab</div>

<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/note/')">Pengeluaran</div>

<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/graceresto/')">Penjualan</div>

<div class="card-neon" onclick="window.open('https://omkstpetrusdanpaulusrasulsekonau-byte.github.io/mistake/')">Mistake</div>

<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/Tracker-Konsumsi-Rokok-/')">Sin</div>

<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/pasimpong/')">Tabungan</div>

<div class="card-neon" onclick="window.open('https://www.neobux.com/m/l/?vl=F0432EC413122E73')">NEOBUX</div>

</div>
</div>

<div class="content" id="content"></div>

</div>

<script>
function showPage(page){
let content=document.getElementById("content");

if(page==="home"){
content.innerHTML=`
<div class="logo"><img src="https://i.postimg.cc/XNRHQwDH/png-transparent-white-house-logo-computer-icons-home-house-home-blue-angle-text-thumbnail.png" alt="logo"><span>Home</span></div>

<img src="https://i.postimg.cc/pTxX4LL5/1af819a68e75bc0b977dc1cafc8e516b.jpg" class="active">
<img src="https://i.postimg.cc/7LNyCMqf/maxresdefault.jpg">
<img src="https://i.postimg.cc/y84qvrd6/njuq-Y8b-VEAK48u-SGWi-Xx-Pi.jpg">
<img src="https://i.postimg.cc/fLJZ6SQr/Website-design.webp" class="active">
</div>
`;
startSlider();
}

if(page==="aktivitas"){
content.innerHTML=`
<div class="logo"><img src="https://i.postimg.cc/FF65mdCy/Screenshot-66.jpg" alt="logo"><span>Aktivitas</span></div>

<div class="grid">
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/drlaser/')">DrLaser</div>
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/HITMATDUTHERI/')">Alkitab</div>
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/note/')">Pengeluaran</div>
</div>
<div class="slider">
<img src="https://i.postimg.cc/DZhHsX8g/download.jpg">
<img src="https://i.postimg.cc/dVt3t12Z/sddefault.jpg">
<img src="https://i.postimg.cc/d3NZLtCR/halaman-20240620125629.png" class="active">
</div>
`;
startSlider();
}

if(page==="history"){
content.innerHTML=`
<h2><i class="fas fa-user-tie"></i> 𝑀𝒴 𝒥𝒪𝐵 <i class=""></i></h2></div>
<div class="grid">
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/graceresto/')">Penjualan</div>
<div class="card-neon" onclick="window.open('https://omkstpetrusdanpaulusrasulsekonau-byte.github.io/mistake/')">Mistake</div>

</div>
<div class="slider">

<img src="https://i.postimg.cc/BnYTJR1V/How-to-answer-Tell-me-about-a-time-when-you-made-a-mistake-in-an-interview-with-confidence-and-cla.jpg">
<img src="https://i.postimg.cc/pTxX4LL5/1af819a68e75bc0b977dc1cafc8e516b.jpg" class="active">
</div>
`;
startSlider();
}

if(page==="walet"){
content.innerHTML=`
<h2><i class="fas fa-credit-card"></i> 𝐸-𝒲𝒜𝐿𝐸𝒯 <i class=""></i></h2></div>
<div class="grid">
<div class="card-neon" onclick="window.open('https://heriyandi9494-cloud.github.io/pasimpong/')">Tabungan</div>
</div>
<div class="slider">
<img src="https://i.postimg.cc/7LNyCMqf/maxresdefault.jpg">
</div>
`;
startSlider();
}

if(page==="web"){
content.innerHTML=`
<h2><i class="fas fa-credit-card"></i> WEB-SITE <i class=""></i></h2></div>
<div class="grid">
<div class="card-neon" onclick="window.open('https://sites.google.com/view/mudasarohani/page_2')">HDS</div>

</div>

<img src="https://i.postimg.cc/fLJZ6SQr/Website-design.webp" class="active">
</div>
`;
startSlider();
}
}

function startSlider(){
let index=0;
let images=document.querySelectorAll(".slider img");

setInterval(()=>{
images.forEach(img=>img.classList.remove("active"));
index=(index+1)%images.length;
images[index].classList.add("active");
},3000);
}

showPage("home");

function toggleMenu(){
document.querySelector(".menu-wrapper").classList.toggle("active");
}

function toggleSidebar(){
document.querySelector(".sidebar-wrapper").classList.toggle("active");
document.querySelector(".overlay").classList.toggle("active");
}

document.querySelectorAll(".card-neon").forEach(btn=>{
btn.addEventListener("click", ()=>{
document.querySelector(".sidebar-wrapper").classList.remove("active");
document.querySelector(".overlay").classList.remove("active");
});
});
</script>

</body>
</html>
