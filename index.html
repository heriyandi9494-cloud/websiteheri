<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Profesional</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0f172a;
    color: white;
}


/* 🔥 EFEK NEON BERJALAN */
.neon-run::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 200%;
    height: 3px;

    background: linear-gradient(
        90deg,
        transparent,
        cyan,
        transparent
    );

    animation: neonMove 3s linear infinite;
}

/* ANIMASI BERJALAN */
@keyframes neonMove {
    0% {
        left: -100%;
    }
    100% {
        left: 100%;
    }
}
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #0a0a0a;
    position: relative;
    overflow: hidden;
}

/* 🔥 BORDER NEON BERJALAN FULL */
.navbar::before {
    content: "";
    position: absolute;
    inset: -2px; /* keluar sedikit biar glow */
    border-radius: 10px;

    background: linear-gradient(
        90deg,
        rgb(6, 230, 237),
        rgb(14, 14, 14)
    );

    background-size: 300% 100%;
    animation: neonBorder 10s linear infinite;

    z-index: 0;
    filter: blur(5px);
}

/* ISI NAVBAR DI ATAS NEON */
.navbar > * {
    position: relative;
    z-index: 1;
}

/* ANIMASI GERAK */
@keyframes neonBorder {
    0% {
        background-position: 0% 50%;
    }
    100% {
        background-position: 300% 50%;
    }
}

/* MARQUEE */
.marquee {
    background: #1e293b;
    padding: 8px;
    overflow: hidden;
    white-space: nowrap;
}

.marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: jalan 30s linear infinite;
}

@keyframes jalan {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

.marquee a {
    color: #38bdf8;
    margin: 0 15px;
    text-decoration: none;
}

/* LAYOUT */
.container {
    display: flex;
}

.sidebar {
    position: relative;
    padding: 15px;
    border-radius: 15px;
    overflow: hidden;
    background: #0b1a2a;
}
/* LAMPU NEON BERJALAN */
.sidebar::before {
    content: "";
    position: absolute;
    inset: -3px; /* keluar dikit biar glow */

    background: linear-gradient(
        90deg,
        cyan,
        blue,
        magenta,
        cyan
    );

    background-size: 300% 300%;
    animation: neonKeliling 6s linear infinite;

    filter: blur(8px); /* efek lampu */
    z-index: 0;
}

/* LAPISAN DALAM (BIAR RAPI) */
.sidebar::after {
    content: "";
    position: absolute;
    inset: 0;
    background: #0b1a2a;
    border-radius: 15px;
    z-index: 0;
}

/* ISI SIDEBAR DI ATAS */
.sidebar * {
    position: relative;
    z-index: 1;
}

/* ANIMASI GERAK KELILING */
@keyframes neonKeliling {
    0% {
        background-position: 0% 50%;
    }
    25% {
        background-position: 100% 50%;
    }
    50% {
        background-position: 100% 100%;
    }
    75% {
        background-position: 0% 100%;
    }
    100% {
        background-position: 0% 50%;
    }
}
/* CONTENT */
.content {
    flex: 1;
    padding: 20px;
}

/* CARD GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
    background: #38bdf8;
    color: black;
}

/* SLIDER */
.slider {
    margin-top: 20px;
    overflow: hidden;
    border-radius: 15px;
}

.slider img {
    width: 100%;
    display: none;
}

.slider img.active {
    display: block;
}

/* WRAPPER SIDEBAR */
.sidebar-wrapper {
    width: 260px;
    height: 100vh;
    padding: 15px;
    background: rgba(10, 20, 40, 0.6);
    backdrop-filter: blur(12px);
    border-right: 1px solid rgba(0,255,255,0.2);
    box-shadow: 0 0 20px rgba(0,255,255,0.1);
}

/* SIDEBAR BOX */
.sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* TITLE */
.sidebar h3 {
    color: cyan;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 1px;
}

/* CARD NEON */
.card-neon {
    background: rgba(0, 20, 40, 0.7);
    border: 1px solid rgba(0,255,255,0.3);
    color: cyan;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: 0.3s ease;
    box-shadow: 0 0 12px rgba(0,255,255,0.2);
}

/* HOVER 3D */
.card-neon:hover {
    transform: translateX(6px) scale(1.05);
    box-shadow: 0 0 25px rgba(0,255,255,0.5);
}
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #020617;
    padding: 15px 20px;
}

/* PEMBUNGKUS MENU */
.menu-wrapper {
    border: 2px solid rgb(46, 248, 244); /* ini seperti kotak merah di gambar */
    padding: 5px;
    border-radius: 8px;
}

/* MENU */
.menu {
    display: flex;
    gap: 10px;
}

/* ITEM MENU */
.menu a {
    padding: 8px 15px;
    border: 2px solid rgb(51, 206, 237);
    border-radius: 5px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

/* HOVER */
.menu a:hover {
    background: #38bdf8;
    color: black;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* CARD NEON */
.card-neon {
    position: relative;
    padding: 20px;
    border-radius: 15px;
    background: #0d0e0d;
    color: rgb(32, 251, 4);
    cursor: pointer;
    overflow: hidden;
    transition: 0.3s;
    border: 1px solid rgba(104, 201, 243, 0.3);
}

/* EFEK GLOW LUAR */
.card-neon:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow:
        0 0 10px #38bdf8,
        0 0 20px #38bdf8,
        0 0 40px #38bdf8;
}

/* GARIS NEON BERGERAK */
.card-neon::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, transparent, #38bdf8, transparent);
    top: -100%;
    left: -100%;
    transition: 0.5s;
}

.card-neon:hover::before {
    top: 100%;
    left: 100%;
}

/* TEKS */
.card-neon h3 {
    margin-bottom: 10px;
    color: #38bdf8;
}

.card-neon p {
    font-size: 14px;
    color: #cbd5f5;
}
.title-box {
    display: inline-block;
    padding: 12px 138px;
    border-radius: 12px;
    margin: 20px;

    background: rgba(0, 20, 40, 0.7);
    border: 1px solid rgba(245, 246, 246, 0.4);

    box-shadow:
        0 0 15px rgba(231, 235, 235, 0.4),
        0 0 30px rgba(239, 243, 243, 0.2);

    backdrop-filter: blur(10px);
}

.title-box h2 {
    margin: 0;
    color: rgb(239, 28, 5);
    letter-spacing: 2px;
}

</style>
</head>

<script>

// SLIDER
function startSlider() {
    let index = 0;
    let images = document.querySelectorAll(".slider img");

    setInterval(() => {
        images.forEach(img => img.classList.remove("active"));
        index = (index + 1) % images.length;
        images[index].classList.add("active");
    }, 3000);
}

// LOAD AWAL
showPage('home');
</script>
